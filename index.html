<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Teal PMS — Dashboard</title><link rel="icon" href="favicon.svg"/><link rel="stylesheet" href="css/style.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4/dist/chart.umd.min.js"></script></head>
<body>
<script src="js/data.js"></script><script src="js/common.js"></script>
<script>seedDemoData(); buildNav('dashboard');</script>
<div class="main-content">
  <!-- Stat tiles -->
  <div class="grid-4" style="margin-bottom:20px" id="stat-tiles"></div>

  <!-- Row 1: Status chart + Priority chart + Activity -->
  <div style="display:grid;grid-template-columns:1fr 1fr 320px;gap:16px;margin-bottom:20px">
    <div class="card card-body">
      <div style="font-weight:700;margin-bottom:12px;font-size:14px">Ticket Status</div>
      <div class="chart-wrap"><canvas id="statusChart"></canvas></div>
    </div>
    <div class="card card-body">
      <div style="font-weight:700;margin-bottom:12px;font-size:14px">Priority Distribution</div>
      <div class="chart-wrap"><canvas id="priorityChart"></canvas></div>
    </div>
    <div class="card card-body" style="display:flex;flex-direction:column">
      <div style="font-weight:700;margin-bottom:12px;font-size:14px">🕐 Recent Activity</div>
      <div id="activity-feed" style="flex:1;overflow-y:auto;max-height:220px"></div>
    </div>
  </div>

  <!-- Row 2: Active sprints + Milestones -->
  <div class="grid-2" style="margin-bottom:20px">
    <div class="card">
      <div class="card-header">
        <span style="font-weight:700;font-size:14px">🔄 Active Sprints</span>
        <a href="scrum.html" class="btn btn-outline btn-sm">View Sprints →</a>
      </div>
      <div id="sprints-panel"></div>
    </div>
    <div class="card">
      <div class="card-header">
        <span style="font-weight:700;font-size:14px">🏁 Milestones</span>
        <a href="roadmap.html" class="btn btn-outline btn-sm">View Roadmap →</a>
      </div>
      <div id="milestones-panel"></div>
    </div>
  </div>

  <!-- Row 3: Overdue + In Progress tickets -->
  <div class="grid-2">
    <div class="card">
      <div class="card-header">
        <span style="font-weight:700;font-size:14px">⚠️ Overdue Tickets</span>
        <a href="tickets.html" class="btn btn-outline btn-sm">View All →</a>
      </div>
      <div id="overdue-panel"></div>
    </div>
    <div class="card">
      <div class="card-header">
        <span style="font-weight:700;font-size:14px">⚡ In Progress</span>
        <a href="board.html" class="btn btn-outline btn-sm">Open Board →</a>
      </div>
      <div id="inprog-panel"></div>
    </div>
  </div>
</div>

<script>
const proj = getActiveProject();
const tickets = proj ? getTicketsByProject(proj.id) : [];
const sprints = proj ? getSprintsByProject(proj.id) : [];

const BLUE='#3b82f6', LBLUE='#60a5fa', WARN='#f59e0b', FAIL='#ef4444', PASS='#22c55e', PURPLE='#8b5cf6';
const tc = () => getComputedStyle(document.documentElement).getPropertyValue('--text-muted').trim() || '#64748b';

// Stat tiles
const done = tickets.filter(t=>t.status==='Done').length;
const inProg = tickets.filter(t=>t.status==='In Progress').length;
const blocked = tickets.filter(t=>t.status==='Blocked').length;
const overdue = tickets.filter(t=>t.dueDate&&new Date(t.dueDate)<new Date()&&t.status!=='Done').length;
const pct = tickets.length ? Math.round(done/tickets.length*100) : 0;
document.getElementById('stat-tiles').innerHTML = [
  {icon:'🎫', val:tickets.length,   label:'Total Tickets',   col:BLUE,   sub:`${pct}% done`},
  {icon:'✅', val:done,             label:'Completed',        col:PASS,   sub:`+${inProg} in progress`},
  {icon:'🔴', val:overdue,          label:'Overdue',          col:FAIL,   sub:'Need attention'},
  {icon:'🚫', val:blocked,          label:'Blocked',          col:WARN,   sub:'Escalate now'},
].map(s=>`<div class="stat-tile">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
    <div style="font-size:24px">${s.icon}</div>
    <div style="font-size:28px;font-weight:800;color:${s.col}">${s.val}</div>
  </div>
  <div style="font-size:13px;font-weight:600">${s.label}</div>
  <div style="font-size:11px;color:var(--text-muted);margin-top:2px">${s.sub}</div>
</div>`).join('');

// Status chart
const statuses=['Backlog','Todo','In Progress','Review','Done','Blocked'];
const sCounts=statuses.map(s=>tickets.filter(t=>t.status===s).length);
new Chart(document.getElementById('statusChart'),{type:'doughnut',data:{labels:statuses,datasets:[{data:sCounts,backgroundColor:['#334155','#3b82f6',WARN,PURPLE,PASS,FAIL],borderWidth:0}]},options:{plugins:{legend:{position:'right',labels:{color:tc(),boxWidth:11,font:{size:11}}}},cutout:'68%'}});

// Priority chart
const prios=['Critical','High','Medium','Low'];
const pCounts=prios.map(p=>tickets.filter(t=>t.priority===p).length);
new Chart(document.getElementById('priorityChart'),{type:'doughnut',data:{labels:prios,datasets:[{data:pCounts,backgroundColor:[FAIL,WARN,BLUE,'#475569'],borderWidth:0}]},options:{plugins:{legend:{position:'right',labels:{color:tc(),boxWidth:11,font:{size:11}}}},cutout:'68%'}});

// Activity feed
const acts = getActivities().filter(a=>!proj||a.projectId===proj.id||!a.projectId).slice(0,20);
const actIcons = {created:'🆕',updated:'✏️',comment:'💬',done:'✅',import:'📥'};
function timeAgo(iso) {
  const d = Math.round((Date.now()-new Date(iso))/1000);
  if(d<60) return 'just now'; if(d<3600) return `${Math.floor(d/60)}m ago`;
  if(d<86400) return `${Math.floor(d/3600)}h ago`; return `${Math.floor(d/86400)}d ago`;
}
document.getElementById('activity-feed').innerHTML = acts.length
  ? acts.map(a=>`<div class="activity-item">
      <div class="activity-dot" style="background:${a.type==='done'?PASS:a.type==='comment'?PURPLE:BLUE}"></div>
      <div>
        <div class="activity-text">${actIcons[a.type]||'•'} ${a.text}${a.ticketKey?` <span class="ticket-key">${a.ticketKey}</span>`:''}</div>
        <div class="activity-time">${timeAgo(a.createdAt)}</div>
      </div>
    </div>`).join('')
  : '<div style="color:var(--text-muted);font-size:12px;padding:12px 0">No activity yet.</div>';

// Active sprints
const activeSprints = sprints.filter(s=>s.status==='Active').slice(0,3);
document.getElementById('sprints-panel').innerHTML = activeSprints.length
  ? activeSprints.map(s=>{
      const st=tickets.filter(t=>t.sprintId===s.id);
      const sd=st.filter(t=>t.status==='Done').length;
      const p=st.length?Math.round(sd/st.length*100):0;
      return `<div style="padding:14px 20px;border-bottom:1px solid var(--border-dim)">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
          <span style="font-weight:600;font-size:13px">${s.name}</span>
          <span style="font-size:12px;color:var(--text-muted)">${fmtDate(s.startDate)} → ${fmtDate(s.endDate)}</span>
        </div>
        ${progressBar(p)}
        <div style="font-size:11px;color:var(--text-muted);margin-top:4px">${sd}/${st.length} done · ${p}%</div>
      </div>`;
    }).join('')
  : `<div style="padding:20px;color:var(--text-muted);font-size:13px">No active sprints. <a href="scrum.html">Start a sprint →</a></div>`;

// Milestones
const ms = getMilestonesByProject(proj?.id||'').sort((a,b)=>new Date(a.date)-new Date(b.date)).slice(0,5);
document.getElementById('milestones-panel').innerHTML = ms.length
  ? ms.map(m=>{
      const d=daysFrom(m.date);
      const col=m.status==='Completed'?PASS:d!==null&&d<0?FAIL:BLUE;
      return `<div style="display:flex;align-items:center;gap:14px;padding:12px 20px;border-bottom:1px solid var(--border-dim)">
        <div style="width:10px;height:10px;background:${col};border-radius:2px;transform:rotate(45deg);flex-shrink:0"></div>
        <div style="flex:1;font-size:13px;font-weight:500">${m.name}</div>
        <div style="text-align:right">
          <div style="font-size:12px">${fmtDate(m.date)}</div>
          ${d!==null?`<div style="font-size:10px;color:${col}">${d<0?`${Math.abs(d)}d late`:d===0?'Today':`${d}d left`}</div>`:''}
        </div>
      </div>`;
    }).join('')
  : `<div style="padding:20px;color:var(--text-muted);font-size:13px">No milestones defined.</div>`;

// Overdue tickets
const overdueList=tickets.filter(t=>t.dueDate&&new Date(t.dueDate)<new Date()&&t.status!=='Done').sort((a,b)=>new Date(a.dueDate)-new Date(b.dueDate)).slice(0,6);
document.getElementById('overdue-panel').innerHTML = overdueList.length
  ? `<div class="table-wrap"><table><thead><tr><th>Key</th><th>Title</th><th>Priority</th><th>Due</th></tr></thead><tbody>
    ${overdueList.map(t=>`<tr>
      <td><span class="ticket-key">${t.key}</span></td>
      <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.title}</td>
      <td>${priorityBadge(t.priority)}</td>
      <td style="color:var(--fail);font-size:12px">${fmtDate(t.dueDate)}</td>
    </tr>`).join('')}
    </tbody></table></div>`
  : `<div style="padding:20px;color:var(--pass);font-size:13px">🎉 No overdue tickets!</div>`;

// In Progress
const ipList=tickets.filter(t=>t.status==='In Progress').slice(0,6);
document.getElementById('inprog-panel').innerHTML = ipList.length
  ? `<div class="table-wrap"><table><thead><tr><th>Key</th><th>Title</th><th>Assignees</th><th>Priority</th></tr></thead><tbody>
    ${ipList.map(t=>`<tr>
      <td><span class="ticket-key">${t.key}</span></td>
      <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.title}</td>
      <td>${renderAvatars(t.assignees,2)}</td>
      <td>${priorityBadge(t.priority)}</td>
    </tr>`).join('')}
    </tbody></table></div>`
  : `<div style="padding:20px;color:var(--text-muted);font-size:13px">No tickets in progress.</div>`;
</script>
</body></html>
