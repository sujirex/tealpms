<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Teal PMS — Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
<script src="js/data.js"></script>
<script src="js/common.js"></script>
<script>seedDemoData(); buildNav('dashboard');</script>
<div class="main-content">
  <div class="page-header">
    <div><div class="page-title">📊 Dashboard</div><div class="page-sub">Project overview and activity</div></div>
    <div class="page-header-actions">
      <button class="btn btn-outline btn-sm" onclick="exportData()">⬇ Backup</button>
      <a href="tickets.html" class="btn btn-primary btn-sm">+ New Ticket</a>
    </div>
  </div>
  <div class="stat-grid" id="dash-stats"></div>
  <div class="grid-2" style="gap:20px;margin-bottom:20px">
    <div class="card">
      <div class="card-header"><div class="card-title">Ticket Status</div></div>
      <div class="card-body"><div class="chart-wrap"><canvas id="status-chart"></canvas></div></div>
    </div>
    <div class="card">
      <div class="card-header"><div class="card-title">Priority Breakdown</div></div>
      <div class="card-body"><div class="chart-wrap"><canvas id="prio-chart"></canvas></div></div>
    </div>
  </div>
  <div class="grid-2" style="gap:20px;margin-bottom:20px">
    <div class="card">
      <div class="card-header"><div class="card-title">📋 Active Sprints</div></div>
      <div class="card-body" id="sprint-panel"></div>
    </div>
    <div class="card">
      <div class="card-header"><div class="card-title">🏁 Milestones</div><a href="#" class="btn btn-ghost btn-sm">View all →</a></div>
      <div class="card-body" id="milestone-panel"></div>
    </div>
  </div>
  <div class="card" style="margin-bottom:20px">
    <div class="card-header"><div class="card-title">⚠️ Overdue Tickets</div><a href="tickets.html?status=overdue" class="btn btn-ghost btn-sm">View all →</a></div>
    <div class="table-wrap">
      <table><thead><tr><th>Key</th><th>Title</th><th>Assignees</th><th>Due</th><th>Priority</th></tr></thead>
      <tbody id="overdue-table"></tbody></table>
    </div>
  </div>
  <div class="card">
    <div class="card-header"><div class="card-title">🔥 In Progress</div><a href="board.html" class="btn btn-ghost btn-sm">Open Board →</a></div>
    <div class="table-wrap">
      <table><thead><tr><th>Key</th><th>Title</th><th>Type</th><th>Assignees</th><th>Progress</th><th>Due</th></tr></thead>
      <tbody id="inprogress-table"></tbody></table>
    </div>
  </div>
</div>
<script>
const proj = getActiveProject();
const tickets = proj ? getTicketsByProject(proj.id).filter(t => t.type !== 'Epic') : [];
const stats = calcProjectStats(proj?.id);
const overdue = tickets.filter(t => t.dueDate && new Date(t.dueDate) < new Date() && t.status !== 'Done');

document.getElementById('dash-stats').innerHTML = `
  <div class="stat-tile"><div class="stat-value">${stats.total}</div><div class="stat-label">Total Tickets</div></div>
  <div class="stat-tile done"><div class="stat-value" style="color:var(--pass)">${stats.done}</div><div class="stat-label">Done</div><div class="stat-sub">${stats.pct}%</div></div>
  <div class="stat-tile warn"><div class="stat-value" style="color:var(--warn)">${stats.inProg}</div><div class="stat-label">In Progress</div></div>
  <div class="stat-tile fail"><div class="stat-value" style="color:var(--fail)">${overdue.length}</div><div class="stat-label">Overdue</div></div>
  <div class="stat-tile info"><div class="stat-value" style="color:var(--info)">${getSprintsByProject(proj?.id||'').filter(s=>s.status==='Active').length}</div><div class="stat-label">Active Sprints</div></div>
`;

// Charts
const textDim = getComputedStyle(document.documentElement).getPropertyValue('--text-muted').trim();
const statCounts = {Done:0,'In Progress':0,'Review':0,Todo:0,Backlog:0,Blocked:0};
tickets.forEach(t=>{if(statCounts[t.status]!==undefined)statCounts[t.status]++;});
new Chart(document.getElementById('status-chart'),{type:'doughnut',data:{labels:Object.keys(statCounts),datasets:[{data:Object.values(statCounts),backgroundColor:['#3fb950','#e3b341','#bc8cff','#58a6ff','#8b949e','#f85149'],borderWidth:2,borderColor:'var(--bg-card)'}]},options:{responsive:true,maintainAspectRatio:false,cutout:'62%',plugins:{legend:{position:'right',labels:{color:'#7ab8b8',font:{size:11},padding:12}}}}});

const prioCounts={Critical:0,High:0,Medium:0,Low:0};
tickets.forEach(t=>{if(prioCounts[t.priority]!==undefined)prioCounts[t.priority]++;});
new Chart(document.getElementById('prio-chart'),{type:'doughnut',data:{labels:Object.keys(prioCounts),datasets:[{data:Object.values(prioCounts),backgroundColor:['#f85149','#ff9500','#e3b341','#58a6ff'],borderWidth:2,borderColor:'var(--bg-card)'}]},options:{responsive:true,maintainAspectRatio:false,cutout:'62%',plugins:{legend:{position:'right',labels:{color:'#7ab8b8',font:{size:11},padding:12}}}}});

// Sprints
const sprints = getSprintsByProject(proj?.id||'').filter(s=>s.status==='Active'||s.status==='Completed').slice(-2);
document.getElementById('sprint-panel').innerHTML = sprints.length ? sprints.map(s=>{
  const st = getTickets().filter(t=>t.sprintId===s.id);
  const done = st.filter(t=>t.status==='Done').length;
  const pct = st.length ? Math.round(done/st.length*100) : 0;
  return `<div style="margin-bottom:14px">
    <div style="display:flex;justify-content:space-between;margin-bottom:6px">
      <span style="font-weight:600;font-size:13px">${s.name}</span>
      <span class="badge ${s.status==='Active'?'badge-progress':'badge-done'}">${s.status}</span>
    </div>
    <div style="font-size:12px;color:var(--text-muted);margin-bottom:6px">${done}/${st.length} tickets · ${pct}%</div>
    ${progressBar(pct)}
  </div>`;
}).join('') : '<p style="color:var(--text-muted);font-size:13px">No active sprints</p>';

// Milestones
const ms = getMilestonesByProject(proj?.id||'').slice(0,5);
document.getElementById('milestone-panel').innerHTML = ms.length ? ms.map(m=>{
  const d = daysFrom(m.date);
  const col = m.status==='Completed'?'var(--pass)':d!==null&&d<0?'var(--fail)':'var(--teal-br)';
  return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
    <div style="width:10px;height:10px;border-radius:2px;background:${col};flex-shrink:0;transform:rotate(45deg)"></div>
    <div style="flex:1;min-width:0">
      <div style="font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m.name}</div>
      <div style="font-size:11px;color:var(--text-muted)">${fmtDate(m.date)}</div>
    </div>
    ${statusBadge(m.status)}
  </div>`;
}).join('') : '<p style="color:var(--text-muted);font-size:13px">No milestones</p>';

// Overdue table
document.getElementById('overdue-table').innerHTML = overdue.slice(0,8).map(t=>`<tr>
  <td><a href="tickets.html" class="ticket-key">${t.key}</a></td>
  <td style="max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.title}</td>
  <td>${renderAvatars(t.assignees)}</td>
  <td style="color:var(--fail);font-size:12px">${fmtDate(t.dueDate)}</td>
  <td>${priorityBadge(t.priority)}</td>
</tr>`).join('') || '<tr><td colspan="5" style="text-align:center;color:var(--pass);padding:16px">✅ No overdue tickets</td></tr>';

// In progress table
const inProg = tickets.filter(t=>t.status==='In Progress').slice(0,8);
document.getElementById('inprogress-table').innerHTML = inProg.map(t=>`<tr>
  <td><span class="ticket-key">${t.key}</span></td>
  <td style="max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.title}</td>
  <td>${typeBadge(t.type)}</td>
  <td>${renderAvatars(t.assignees)}</td>
  <td style="min-width:100px">${progressBar(t.pctComplete)}<span style="font-size:11px;color:var(--text-muted)">${t.pctComplete||0}%</span></td>
  <td style="font-size:12px;color:var(--text-muted)">${fmtDate(t.dueDate)}</td>
</tr>`).join('') || '<tr><td colspan="6" style="text-align:center;color:var(--text-muted);padding:16px">No tickets in progress</td></tr>';
</script>
</body></html>
